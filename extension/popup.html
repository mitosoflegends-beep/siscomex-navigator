<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Siscomex Auto</title>
    <style>
      body { font-family: -apple-system, system-ui, Segoe UI, sans-serif; width: 280px; margin: 0; padding: 16px; background: #0f172a; color: #f8fafc; }
      h1 { font-size: 14px; margin: 0 0 4px; font-weight: 600; }
      p { font-size: 12px; margin: 0 0 12px; color: #94a3b8; line-height: 1.4; }
      button { width: 100%; padding: 10px; border: 0; border-radius: 8px; background: #2563eb; color: white; font-weight: 600; font-size: 13px; cursor: pointer; }
      button:hover { background: #1d4ed8; }
      button.secondary { background: transparent; color: #94a3b8; margin-top: 8px; padding: 6px; }
      #status { margin-top: 12px; padding: 8px; background: #1e293b; border-radius: 6px; font-size: 11px; min-height: 14px; color: #cbd5e1; }
      .ok { color: #4ade80 !important; }
      .err { color: #f87171 !important; }
    </style>
  </head>
  <body>
    <h1>🤖 Siscomex Auto</h1>
    <p>Logue com seu certificado e confirme o captcha. Depois clique abaixo.</p>
    <button id="open">1. Abrir Portal Único</button>
    <button id="run" style="margin-top:8px">2. Ir até Consultar Duimp</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
